# Local development / smoke-test stack for the Blockli Go Cache Proxy.
#
# Mirrors the Magic Container pod layout:
#   - Redis on redis:6379 (same as localhost:6379 inside the actual pod)
#   - Go proxy on :8080
#
# Usage:
#   docker compose up --build
#
#   # Health check
#   curl http://localhost:8080/health
#
#   # Store a value (TTL 60s)
#   curl -X PUT "http://localhost:8080/cache?key=test&ttl=60" \
#        -H "X-Cache-Token: dev-secret" \
#        -H "Content-Type: application/json" \
#        -d '{"hello":"world"}'
#
#   # Retrieve it
#   curl "http://localhost:8080/cache?key=test" \
#        -H "X-Cache-Token: dev-secret"
#
#   # Purge by pattern
#   curl -X POST http://localhost:8080/cache/purge \
#        -H "X-Cache-Token: dev-secret" \
#        -H "Content-Type: application/json" \
#        -d '{"pattern":"blockli:*"}'

services:
  app:
    build: .
    ports:
      - "8080:8080"
    environment:
      REDIS_URL:       redis://redis:6379
      CACHE_API_TOKEN: dev-secret
      PORT:            "8080"
    depends_on:
      redis:
        condition: service_healthy

  redis:
    image: redis:7-alpine
    command: redis-server --save "" --appendonly no --maxmemory 512mb --maxmemory-policy allkeys-lru
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
